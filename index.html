<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>LetterBrain — ABC for Kids</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header>
            <h1>🔤 LetterBrain</h1>
            <div class="score">⭐ <span id="stars">0</span></div>
        </header>

        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="big-emoji">🎓</div>
            <h2>Learn Your ABCs!</h2>
            <p>Pick the right picture for each letter</p>

            <div class="settings">
                <label for="level-select">Level</label>
                <select id="level-select">
                    <option value="1">Level 1: A – D</option>
                    <option value="2">Level 2: E – H</option>
                    <option value="3">Level 3: I – L</option>
                    <option value="4">Level 4: M – P</option>
                    <option value="5">Level 5: Q – T</option>
                    <option value="6">Level 6: U – X</option>
                    <option value="7">Level 7: Y – Z (+ review)</option>
                </select>
            </div>

            <div class="settings">
                <label class="toggle-label">
                    <input type="checkbox" id="video-toggle" checked>
                    <span>🎬 Video Reward</span>
                </label>
            </div>

            <button class="start-btn" onclick="startGame()">Let's Go! 🚀</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div id="letter-display">
                <div class="letter-label">What starts with</div>
                <div id="big-letter">A</div>
                <div class="letter-label">?</div>
            </div>
            <div id="choices"></div>
            <div id="progress">
                <span id="round-info">1 / 6</span>
                <div class="progress-track">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Feedback Overlay -->
        <div id="feedback" class="feedback hidden">
            <div id="feedback-emoji"></div>
            <div id="feedback-text"></div>
        </div>

        <!-- Video Reward Overlay -->
        <div id="video-overlay" class="video-overlay hidden">
            <div class="video-wrap">
                <div id="yt-player"></div>
            </div>
        </div>

        <!-- Done Screen -->
        <div id="done-screen" class="screen">
            <div class="big-emoji">🎉</div>
            <h2>Amazing Job!</h2>
            <p>You got <span id="final-score">0</span> out of <span id="final-total">6</span> stars!</p>
            <div id="final-stars"></div>
            <button class="start-btn" onclick="startGame()">Play Again! 🔄</button>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
