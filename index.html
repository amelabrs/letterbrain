<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#764ba2">
    <title>LetterBrain — ABC for Kids</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header>
            <h1 id="app-title">🔤 LetterBrain</h1>
            <div class="header-right">
                <div class="score">⭐ <span id="stars">0</span></div>
                <button id="settings-btn" class="settings-icon" title="Settings">⚙️</button>
            </div>
        </header>

        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <div class="big-emoji">🎓</div>
            <h2>Learn Your ABCs!</h2>

            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="normal">🔤 Letters</button>
                <button class="mode-tab" data-mode="reverse">🖼️ Pictures</button>
            </div>

            <div id="level-grid"></div>

            <div class="settings">
                <label class="toggle-label">
                    <input type="checkbox" id="video-toggle" checked>
                    <span>🎬 Video Reward</span>
                </label>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="screen">
            <div id="letter-display">
                <div class="letter-label">What starts with</div>
                <div id="big-letter">A</div>
                <div class="letter-label">?</div>
            </div>
            <div id="choices"></div>
            <div id="progress">
                <span id="round-info">1 / 6</span>
                <div class="progress-track">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
            </div>
        </div>

        <!-- Feedback Overlay -->
        <div id="feedback" class="feedback hidden">
            <div id="feedback-emoji"></div>
            <div id="feedback-text"></div>
        </div>

        <!-- Video Reward Overlay -->
        <div id="video-overlay" class="video-overlay hidden">
            <div class="video-wrap">
                <div id="yt-player"></div>
            </div>
        </div>

        <!-- Done Screen -->
        <div id="done-screen" class="screen">
            <div class="big-emoji">🎉</div>
            <h2>Amazing Job!</h2>
            <p>You got <span id="final-score">0</span> out of <span id="final-total">6</span> stars!</p>
            <div id="final-stars"></div>
            <div id="unlock-msg" class="unlock-msg" style="display:none">🌟 New Level Unlocked! 🌟</div>
            <button class="start-btn" onclick="showScreen('start-screen')">Play Again! 🔄</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="app.js"></script>
</body>
</html>
